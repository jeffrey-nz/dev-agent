name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    name: Syntax & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Syntax-check all source files
        # src/webview/ uses ESM import/export and is bundled for the browser by
        # esbuild — node --check rejects it as CJS in this commonjs package.
        run: find src scripts bin -name '*.js' -o -name '*.mjs' -o -name '*.cjs' | grep -v 'src/webview' | xargs -n1 node --check

      - name: Build extension bundle
        run: npm run build

      - name: Verify bundle exists
        run: test -f dist/extension.cjs
